name: "Build kernels for test"

env:
  OUT_DIR: "${{ github.workspace }}/out"

on:
  workflow_call:
    inputs:
      from_ci:
        type: boolean
        required: false
        default: true

  workflow_dispatch:

jobs:
  Set-repos:
    name: "🐂 Parse repos.json"
    runs-on: ubuntu-latest
    outputs:
      repos: ${{ steps.generate-matrix.outputs.repos }}
      builddate: ${{ steps.generate-builddate.outputs.builddate }}
    steps:
      - name: "😄 Checkout"
        uses: actions/checkout@v3

      - name: "😆 Generate Matrix"
        id: generate-matrix
        run: |
          echo "repos<<EOF" >> $GITHUB_OUTPUT
          jq -s '[.[][]]' repos/repos*.json >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - name: "⏰ Set builddate"
        id: generate-builddate
        run: echo "builddate=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

  Build-Kernel:
    name: "🐎 Build kernel"
    runs-on: ubuntu-latest
    needs:
      - Set-repos
    strategy:
      fail-fast: false
      matrix:
        repos: ${{ fromJSON(needs.Set-repos.outputs.repos) }}
    env:
      WORKSPACE: ${{ github.workspace }}
      builddate: "${{ needs.Set-repos.outputs.builddate }}"

      KNAME: ${{ matrix.repos.kernelName }}
      KERNEL_DEVICE: ${{ matrix.repos.kernelSource.device }}
      DEFCONFIG_NAME: ${{ matrix.repos.kernelSource.defconfig }}

      withRoot: ${{ matrix.repos.withRoot }}
      withSUSFS: ${{ matrix.repos.withSUSFS }}
      whichSUSFS: ${{ matrix.repos.whichSUSFS }}
      withKPM: ${{ matrix.repos.withKPM }}
      ccache: ${{ matrix.repos.ccache }}
      useAnykernel: ${{ matrix.repos.AnyKernel3.use }}
      release: ${{ matrix.repos.AnyKernel3.release }}

    steps:
      - name: "😄 Checkout"
        uses: actions/checkout@v3

      - name: "🟣 Set Kernel Variables"
        run: |
          echo "KERNEL_NAME=${{ matrix.repos.kernelSource.name }}" >> $GITHUB_ENV
          echo "KERNEL_REPO=${{ matrix.repos.kernelSource.repo }}" >> $GITHUB_ENV
          echo "KERNEL_BRANCH=${{ matrix.repos.kernelSource.branch }}" >> $GITHUB_ENV

          echo "toolchains=$(echo '${{ toJSON(matrix.repos.toolchains) }}' | jq -c)" >> $GITHUB_ENV
          echo "params=$(echo '${{ toJSON(matrix.repos.params) }}' | jq -c)" >> $GITHUB_ENV
          echo "THREAD=$(nproc --all)" >> $GITHUB_ENV

      - name: "⭐ Install prerequisites"
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi libssl-dev libfl-dev
          sudo apt-get install -y curl git ftp lftp wget libarchive-tools ccache
          sudo apt-get install -y zip unzip tar gzip bzip2 rar unrar
          sudo apt-get install -y checkinstall libncursesw5-dev libsqlite3-dev tk-dev libgdbm-dev libc6-dev libbz2-dev libffi-dev
          wget https://www.python.org/ftp/python/2.7.18/Python-2.7.18.tgz
          tar -xvf Python-2.7.18.tgz
          cd Python-2.7.18
          ./configure
          make -j$(nproc)
          sudo make install
          curl https://bootstrap.pypa.io/pip/2.7/get-pip.py -o get-pip.py
          sudo python2.7 get-pip.py
          sudo update-alternatives --install /usr/bin/python python /usr/local/lib/python2.7 1
          sudo update-alternatives --install /usr/bin/python python /usr/bin/python3 2 || true
          cd ..

      - name: "🚮 Clear older runs"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh run list -L400 --json databaseId -q '.[].databaseId' | tail -n+5 | xargs -IID gh api "repos/$GITHUB_REPOSITORY/actions/runs/ID" -X DELETE || :

      - name: "🚄 Create cache key from `repos`"
        if: ${{ env.ccache == 'true' }}
        id: ccache_key
        run: |
          ccache -o compression=false -o cache_dir=$HOME/.ccache
          echo "CACHE_KEY=$(echo -n '${{ toJSON(matrix.repos) }}' | base64 -w 0 | cut -c -48)" >> $GITHUB_OUTPUT

      - name: "🚅 Cache ccache files"
        if: ${{ env.ccache == 'true' }}
        uses: actions/cache@v3
        with:
          path: |
            ~/.ccache
            ${{ env.OUT_DIR }}
          key: ccache-${{ env.KERNEL_NAME }}-${{ steps.ccache_key.outputs.CACHE_KEY }}-${{ env.builddate }}
          restore-keys: |
            ccache-${{ env.KERNEL_NAME }}-${{ steps.ccache_key.outputs.CACHE_KEY }}-${{ env.builddate }}

      - name: "⏰ Setup Anykernel3"
        env:
          params: "${{ toJSON(matrix.repos.AnyKernel3) }}"
        run: |
          ANYKERNEL_REPO=$(echo $params | jq -r ".repo")
          ANYKERNEL_BRANCH=$(echo $params | jq -r ".branch")
          git clone --recursive --depth=1 -j $(nproc) --branch $ANYKERNEL_BRANCH $ANYKERNEL_REPO AnyKernel3

          echo "🤔 Setup Anykernel3 => ($ANYKERNEL_REPO)"

      - name: "🌟 Clone kernel source => (${{ env.KERNEL_REPO }})"
        run: |
          git clone --depth=1 -j $(nproc) --branch $KERNEL_BRANCH $KERNEL_REPO $KERNEL_NAME
          echo -e "\n⚠️ Kernel is at commit: $(git -C $KERNEL_NAME rev-parse HEAD)\n"

          echo "🤔 Clone kernel source => ($KERNEL_REPO)"

      - name: "💫 Get toolchains"
        run: |
          toolchains_num="$(echo $toolchains | jq 'length')"
          echo "🤔 There is $toolchains_num defined toolchains."
          for ((i=0;i<toolchains_num;i++)); do
            toolchain_name=$(echo $toolchains | jq -r ".[$i].name")
            # Github
            toolchain_repo=$(echo $toolchains | jq -r ".[$i].repo")
            toolchain_branch=$(echo $toolchains | jq -r ".[$i].branch")
            # From archive
            toolchain_url=$(echo $toolchains | jq -r ".[$i].url")

            echo $toolchain_url
            if [ -z "${toolchain_url:-}" ] || [ "$toolchain_url" = "null" ];  then
              git clone --recursive --depth=1 -j $(nproc) --branch $toolchain_branch $toolchain_repo $toolchain_name
              echo "🤔 Clone $toolchain_name => ($toolchain_repo)"
            else
              wget "$toolchain_url"
              filename="${toolchain_url##*/}"
              mkdir -p $toolchain_name
              case "$filename" in
                *.zip)
                  unzip -d $toolchain_name "$filename"
                  ;;
                *.tar)
                  tar xvf "$filename" -C $toolchain_name
                  ;;
                *.tar.gz)
                  tar zxvf "$filename" -C $toolchain_name
                  ;;
                *.rar)
                  unrar x "$filename" $toolchain_name
                  ;;
                *)
                  echo "unknown file type: $filename"
                  ;;
              esac
            fi

            jq -r ".[$i].binPath[] | tostring" <<< "$toolchains" | while read -r bin_path; do
              echo "$WORKSPACE/$toolchain_name/$bin_path" >> $GITHUB_PATH
            done
          done

      - name: "😎 Set args"
        id: generate-args
        run: |
          echo "🤔 PATH Variable: $PATH"

          ARCH=$(echo $params | jq -r ".ARCH")
          CC=$(echo $params | jq -r ".CC")

          args="-j${{ env.THREAD }}"
          if [ -n "${{ env.OUT_DIR }}" ]; then
            mkdir -p ${{ env.OUT_DIR }} && args="$args O=${{ env.OUT_DIR }}"
          fi
          if [ -n "$ARCH" ]; then
            args="$args ARCH=$ARCH"
          fi
          if [ -n "$CC" ]; then

            if [[ "$CC" == *"/"* ]]; then
              CC=${{ env.WORKSPACE }}/$CC
            fi

            if [ ${{ env.ccache }} = true ]; then
              args="$args CC=\"ccache $CC\""
            else
              args="$args CC=$CC"
            fi
          fi
          while read -r externalCommand; do
            key=$(echo "$externalCommand" | cut -d= -f1)
            value=$(echo "$externalCommand" | cut -d= -f2)
            if [[ "$value" == *"/"* ]]; then
              value="${{ env.WORKSPACE }}/$value"
            fi
            args="$args $key=$value"
          done < <(jq -r '.externalCommand | to_entries[] | "\(.key)=\(.value)"' <<< "$params")

          echo "🤔 $args"
          echo "ARCH=$ARCH" >> $GITHUB_OUTPUT
          echo "args=$args" >> $GITHUB_OUTPUT

      - name: "😋 Integrate KernelSU-Next"
        id: integrate-kernelsu-next
        working-directory: ${{ env.KERNEL_NAME }}
        if: ${{ env.withRoot == 'ksun' }}
        run: |
          # Remove stale symlink + old dirs before setup
          rm -rf KernelSU KernelSU-Next drivers/kernelsu

          # Run setup.sh (clones KernelSU-Next/KernelSU-Next, wires Makefile/Kconfig)
          curl -LSs "https://raw.githubusercontent.com/rifsxd/KernelSU-Next/next/kernel/setup.sh" | bash -s

          # Use v3.1.0-legacy-susfs: flat file structure compatible with SUSFS patches,
          # and SUSFS already integrated in the driver (no separate driver patch needed).
          # v3.2.0-legacy restructured driver into subdirs — incompatible with available patches.
          KSU_TAG="v3.1.0-legacy-susfs"
          echo "Switching KernelSU-Next to tag: ${KSU_TAG}"
          git -C KernelSU-Next fetch --unshallow 2>/dev/null || true
          git -C KernelSU-Next checkout "$KSU_TAG"

          # Kbuild checks for ksu_handle_sys_reboot in kernel/reboot.c when KPROBES=n (manual hook mode).
          # begonia has CONFIG_KPROBES=n so this check is mandatory.
          python3 ${{ github.workspace }}/scripts/patch_reboot_ksu.py

          # Version formula for v3.1.0-legacy-susfs Kbuild: 30000 + rev-count + 118
          KSU_GIT_COUNT=$(git -C KernelSU-Next rev-list --count HEAD 2>/dev/null || echo "0")
          KSU_VERSION=$((30000 + KSU_GIT_COUNT + 118))
          echo "ROOT_VERSION=KSUN-v${KSU_VERSION}" >> $GITHUB_OUTPUT
          echo "KernelSU-Next tag: ${KSU_TAG} | computed version: ${KSU_VERSION}"

      - name: "🥷 Add SUSFS patches"
        working-directory: ${{ env.KERNEL_NAME }}
        if: ${{ env.withRoot == 'ksun' && env.withSUSFS == 'true' }}
        run: |
          # Step 1: KSU hooks (exec.c, input.c, open.c, read_write.c, stat.c, devpts/inode.c)
          # Apply full 0001 patch then revert namespace.c — bka already has can_umount/path_umount there.
          git clone --depth=1 https://github.com/cvnertnc/susfs4ksu-begonia-old -b dev ksu_tmp
          patch -p1 < ksu_tmp/kernel_patches/0001-fs-implement-KernelSU.patch
          git checkout -- fs/namespace.c
          rm -rf ksu_tmp

          # Step 2: SUSFS source + headers from simonpunk kernel-4.14 branch.
          # CRITICAL: simonpunk's susfs_def.h defines DEFAULT_SUS_MNT_ID/GROUP_ID constants
          # that cvnertnc's outdated susfs_def.h was missing — causing build failure.
          SBASE="https://gitlab.com/simonpunk/susfs4ksu/-/raw/kernel-4.14/kernel_patches"
          curl -fsSL "${SBASE}/fs/susfs.c"                   -o fs/susfs.c
          curl -fsSL "${SBASE}/fs/sus_su.c"                  -o fs/sus_su.c
          curl -fsSL "${SBASE}/include/linux/susfs.h"        -o include/linux/susfs.h
          curl -fsSL "${SBASE}/include/linux/susfs_def.h"    -o include/linux/susfs_def.h
          curl -fsSL "${SBASE}/include/linux/sus_su.h"       -o include/linux/sus_su.h

          # Step 3: Apply SUSFS kernel integration patch (4.14-specific).
          # Uses #include <linux/susfs_def.h> for constants — does NOT redefine can_umount/path_umount.
          # Apply after KSU hooks so fuzz handles any line-offset shifts.
          curl -fsSL "${SBASE}/50_add_susfs_in_kernel-4.14.patch" | patch -p1 --fuzz=3 || true

          # v3.1.0-legacy-susfs already has SUSFS integrated in the driver — no driver patch needed.

          grep -q "ksu_handle_execve" fs/exec.c && echo "exec.c hook: OK" || echo "WARNING: exec.c hook missing"

      - name: "⚙️ Append KSU and SUSFS configs to defconfig"
        working-directory: ${{ env.KERNEL_NAME }}
        if: ${{ env.withRoot == 'ksun' && env.withSUSFS == 'true' }}
        env:
          arch: ${{ steps.generate-args.outputs.ARCH }}
        run: |
          DEFCONFIG="arch/${{ env.arch }}/configs/${{ env.DEFCONFIG_NAME }}"
          echo 'CONFIG_KALLSYMS_ALL=y' >> "$DEFCONFIG"
          echo 'CONFIG_KSU=y' >> "$DEFCONFIG"
          echo 'CONFIG_KSU_SUSFS=y' >> "$DEFCONFIG"
          echo 'CONFIG_KSU_SUSFS_SUS_PATH=y' >> "$DEFCONFIG"
          echo 'CONFIG_KSU_SUSFS_SUS_MOUNT=y' >> "$DEFCONFIG"
          echo 'CONFIG_KSU_SUSFS_SUS_KSTAT=y' >> "$DEFCONFIG"
          echo 'CONFIG_KSU_SUSFS_TRY_UMOUNT=y' >> "$DEFCONFIG"
          echo 'CONFIG_KSU_SUSFS_SPOOF_UNAME=y' >> "$DEFCONFIG"
          echo 'CONFIG_KSU_SUSFS_ENABLE_LOG=y' >> "$DEFCONFIG"
          echo 'CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y' >> "$DEFCONFIG"
          echo 'CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y' >> "$DEFCONFIG"
          echo 'CONFIG_KSU_SUSFS_OPEN_REDIRECT=y' >> "$DEFCONFIG"
          echo 'CONFIG_OVERLAY_FS=y' >> "$DEFCONFIG"
          echo 'CONFIG_TMPFS_XATTR=y' >> "$DEFCONFIG"

      - name: "👍 Make defconfig"
        working-directory: ${{ env.KERNEL_NAME }}
        env:
          args: ${{ steps.generate-args.outputs.args }}
          arch: ${{ steps.generate-args.outputs.ARCH }}
        run: |
          echo "PATH Variable: $PATH"
          make ${{ env.args }} ${{ env.DEFCONFIG_NAME }}

      - name: "🎶 Build kernel"
        working-directory: ${{ env.KERNEL_NAME }}
        env:
          args: ${{ steps.generate-args.outputs.args }}
        run: |
          echo "PATH Variable: $PATH"
          make ${{ env.args }}

      - name: "✅ Verify KSU compiled into kernel"
        working-directory: ${{ env.KERNEL_NAME }}
        if: ${{ env.withRoot == 'ksun' }}
        env:
          args: ${{ steps.generate-args.outputs.args }}
          arch: ${{ steps.generate-args.outputs.ARCH }}
        run: |
          SYSMAP="${{ env.OUT_DIR }}/System.map"
          if [ ! -f "$SYSMAP" ]; then
            echo "ERROR: System.map not found at $SYSMAP — kernel did not build"
            exit 1
          fi
          if grep -q "ksu_handle_execve" "$SYSMAP"; then
            echo "KSU symbols confirmed in System.map — driver compiled successfully"
          else
            echo "ERROR: KSU symbols NOT found in System.map — driver was not compiled into kernel!"
            echo "Manual hook check likely failed. Verify reboot.c patch and kernel/reboot.c content:"
            grep -n "ksu_handle_sys_reboot" kernel/reboot.c || echo "  ksu_handle_sys_reboot NOT in reboot.c"
            exit 1
          fi

      - name: "❤️ Pack AnyKernel3.zip"
        if: ${{ env.useAnykernel == 'true' }}
        env:
          arch: ${{ steps.generate-args.outputs.ARCH }}
          anykernel: "${{ env.WORKSPACE }}/${{ env.KERNEL_DEVICE }}-${{ steps.integrate-kernelsu-next.outputs.ROOT_VERSION }}-${{ env.KERNEL_NAME }}-${{ env.builddate }}"
        run: |
          ls -al

          if [ -e "${{ env.OUT_DIR }}/arch/${{ env.arch }}/boot/Image.gz" ]; then
            cp -f ${{ env.OUT_DIR }}/arch/${{ env.arch }}/boot/Image.gz ./AnyKernel3/
          fi

          cd AnyKernel3/
          zip -q -r "${{ env.anykernel }}.zip" *

      - name: "💾 Upload AnyKernel3 image => (${{ env.builddate }})"
        uses: actions/upload-artifact@v4
        if: ${{ env.useAnykernel == 'true' }}
        with:
          name: "${{ env.KERNEL_DEVICE }}-${{ steps.integrate-kernelsu-next.outputs.ROOT_VERSION }}-${{ env.KERNEL_NAME }}-${{ env.builddate }}"
          path: AnyKernel3/*
